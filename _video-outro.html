<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<style>
  html,body { margin:0; padding:0; height:100%; background:#000; overflow:hidden;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, sans-serif;
    color:#f4fbff; }
  .stage {
    position: fixed; inset: 0;
    background:
      radial-gradient(circle at 50% 30%, rgba(125,255,177,0.15) 0%, rgba(125,255,177,0) 50%),
      linear-gradient(180deg, #052a52 0%, #021024 60%, #000 100%);
    display: grid; place-items: center;
  }
  .stage::before {
    content:""; position:absolute; inset:0;
    background: repeating-linear-gradient(80deg, rgba(255,255,255,0.06) 0 6px, transparent 6px 110px);
    mix-blend-mode: screen; animation: drift 18s linear infinite;
  }
  @keyframes drift { 0%{transform:translateX(-30px);} 100%{transform:translateX(30px);} }
  .bubble { position:absolute; bottom:-30px; border-radius:50%;
    background: radial-gradient(circle at 30% 30%, #ffffff88, #ffffff11 60%, transparent 70%);
    animation: bubbleUp linear infinite; }
  @keyframes bubbleUp { 0%{transform:translateY(0); opacity:0;} 10%{opacity:0.7;} 100%{transform:translateY(-110vh); opacity:0;} }
  .center { position:relative; z-index:2; text-align:center; padding: 0 6vw; }
  .eyebrow {
    color:#6ee7ff; font-weight:800; letter-spacing:5px; text-transform:uppercase;
    font-size: 13px; margin-bottom: 18px;
    animation: fadeIn 1s 0.1s ease both;
  }
  h1 {
    margin: 0; font-size: 64px; font-weight: 900; line-height: 1.05;
    letter-spacing: -1px;
    animation: rise 1s 0.2s cubic-bezier(.2,.8,.2,1) both;
  }
  h1 em {
    font-style: normal;
    background: linear-gradient(135deg, #7dffb1, #6ee7ff, #ffe9a8);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .sub {
    margin: 22px auto 0; max-width: 720px;
    font-size: 19px; line-height: 1.4; color: #b9d6ea;
    animation: fadeIn 1s 0.5s ease both;
  }
  .features {
    display: flex; gap: 20px; justify-content: center; margin-top: 30px;
    animation: fadeIn 1s 0.8s ease both;
  }
  .features div {
    padding: 14px 22px;
    background: rgba(2,16,36,0.6);
    border: 1px solid rgba(110,231,255,0.4);
    border-radius: 12px;
    font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase;
    color: #6ee7ff; font-weight: 800;
  }
  .cta {
    margin-top: 38px;
    font-size: 18px; color: #ffe9a8;
    letter-spacing: 2px; text-transform: uppercase;
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.85;} 50%{opacity:1;transform:scale(1.03);} }
  @keyframes rise { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform:none; } }
  @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
</style></head>
<body>
<div class="stage">
  <div class="bubble" style="left:10%;width:7px;height:7px;animation-duration:13s;"></div>
  <div class="bubble" style="left:30%;width:10px;height:10px;animation-duration:17s;animation-delay:1s;"></div>
  <div class="bubble" style="left:55%;width:6px;height:6px;animation-duration:11s;animation-delay:2s;"></div>
  <div class="bubble" style="left:75%;width:9px;height:9px;animation-duration:15s;animation-delay:0.5s;"></div>
  <div class="center">
    <div class="eyebrow">An HSU Master's Thesis Project</div>
    <h1>By <em>Dan Close</em></h1>
    <p class="sub">Cal Poly Humboldt · Marine Sciences.<br/>Four single-page features — hand-built, narrated, offline-ready.</p>
    <div class="features">
      <div>🌊 Aquatic ecology</div>
      <div>🌊 Marine restoration</div>
      <div>🏞 Freshwater</div>
      <div>🤿 Scientific diving</div>
    </div>
    <div class="cta">▶ Link in description · Thanks for taking the dive</div>
  </div>
</div>
</body></html>
